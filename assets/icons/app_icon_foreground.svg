<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024px" height="1024px" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
   <g transform="translate(150, 150)" fill="#2F80ED">
      <!-- Calendar Icon -->
      <rect x="100" y="130" width="624" height="624" rx="40" stroke="#2F80ED" stroke-width="40" fill="none"/>
      
      <!-- Calendar Lines -->
      <line x1="100" y1="260" x2="724" y2="260" stroke="#2F80ED" stroke-width="30"/>
      
      <!-- Calendar Days -->
      <circle cx="225" cy="360" r="45" fill="#2F80ED"/>
      <circle cx="375" cy="360" r="45" fill="#2F80ED"/>
      <circle cx="525" cy="360" r="45" fill="#2F80ED"/>
      
      <circle cx="225" cy="490" r="45" fill="#2F80ED"/>
      <circle cx="375" cy="490" r="45" fill="#2F80ED"/>
      <circle cx="525" cy="490" r="45" fill="#2F80ED"/>
      
      <circle cx="225" cy="620" r="45" fill="#2F80ED"/>
      <circle cx="375" cy="620" r="45" fill="#2F80ED"/>
      <circle cx="525" cy="620" r="45" fill="#2F80ED"/>
      
      <!-- Plus Symbol (Medical Cross) -->
      <rect x="280" y="30" width="60" height="230" rx="20" fill="#2F80ED"/>
      <rect x="195" y="115" width="230" height="60" rx="20" fill="#2F80ED"/>
   </g>
</svg> 